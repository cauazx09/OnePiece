<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autenticação JWT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Autenticação JWT</h1>

        <div id="login-section">
            <h2>Login</h2>
            <form id="login-form">
                <input type="text" id="username" placeholder="Usuário" required class="form-control">
                <input type="password" id="password" placeholder="Senha" required class="form-control">
                <button type="submit">Entrar</button>
            </form>
            <p id="login-message"></p>
        </div>

        <div id="secret-section" class="hidden">
            <h2>Painel Secreto</h2>
            <p id="secret-message"></p>
            <button id="logout-button">Sair</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
